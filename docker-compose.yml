services:
  postgres:
    image: postgres:16-alpine
    container_name: negotiations_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: negotiations
      POSTGRES_USER: negotiations
      POSTGRES_PASSWORD: negotiations_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

volumes:
  postgres_data_local: